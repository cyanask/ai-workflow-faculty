<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Workflow Faculty</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #0b1220;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #f7f5ee;
      --panel: #ffffff;
      --blue: #002fa7;
      --gold: #c6a15b;
      --teal: #0b766d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 40px;
    }

    main {
      width: min(1040px, 100%);
      min-height: min(640px, calc(100vh - 80px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 44px;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: clamp(28px, 5vw, 56px);
      box-shadow: 0 22px 70px rgba(15, 23, 42, 0.08);
    }

    .mark {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    .mark span {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mark span::before {
      content: "";
      width: 32px;
      height: 32px;
      background-image: url("assets/aipha/nero-mark.svg");
      background-repeat: no-repeat;
      background-size: 145px 46px;
      background-position: -10px -7px;
      border: 1px solid var(--gold);
    }

    .mark b {
      color: var(--gold);
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 44px;
      align-items: end;
    }

    h1 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(44px, 7vw, 76px);
      line-height: 1.02;
      letter-spacing: 0;
      font-weight: 680;
    }

    .lead {
      margin: 24px 0 0;
      max-width: 650px;
      color: #344054;
      font-size: clamp(18px, 2vw, 23px);
      line-height: 1.55;
      font-weight: 500;
    }

    .links {
      display: grid;
      gap: 16px;
    }

    a.card {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 20px;
      align-items: center;
      min-height: 136px;
      padding: 24px;
      color: inherit;
      text-decoration: none;
      border: 1px solid var(--line);
      background: #fafafa;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    a.card:hover,
    a.card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--blue);
      box-shadow: 0 18px 42px rgba(0, 47, 167, 0.12);
      outline: none;
    }

    .card em {
      display: grid;
      place-items: center;
      width: 76px;
      height: 76px;
      background: var(--blue);
      color: #fff;
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 18px;
      font-style: normal;
      font-weight: 800;
    }

    .card:nth-child(2) em {
      background: var(--teal);
    }

    .card strong {
      display: block;
      font-size: 26px;
      line-height: 1.15;
    }

    .card span {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 18px;
      font-size: 13px;
      line-height: 1.4;
    }

    @media (max-width: 820px) {
      body {
        padding: 18px;
      }

      main {
        min-height: calc(100vh - 36px);
        gap: 34px;
      }

      .hero {
        grid-template-columns: 1fr;
        align-items: start;
      }

      footer {
        flex-direction: column;
      }
    }

    @media (max-width: 520px) {
      a.card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="mark">
      <span>AI Workflow Faculty</span>
      <b>Evidence · Workflow · Harness</b>
    </header>

    <section class="hero" aria-label="课程入口">
      <div>
        <h1>知识型工作者的 AI 工作流训练课</h1>
        <p class="lead">面向审计、律师、投行、财务等专业场景。重点不是具体工具操作，而是把 AI 放进证据、状态、质量门、人工复核和持续改进之内。</p>
      </div>

      <nav class="links" aria-label="选择版本">
        <a class="card" href="longform.html">
          <em>01</em>
          <span>
            <strong>长文讲义</strong>
            <span>适合备课、复盘和作为讲师手册阅读。</span>
          </span>
        </a>
        <a class="card" href="ppt.html">
          <em>02</em>
          <span>
            <strong>PPT 课件</strong>
            <span>适合现场授课、横向翻页和投影展示。</span>
          </span>
        </a>
      </nav>
    </section>

    <footer>
      <span>AI 工作流训练课件</span>
      <span>长文和 PPT 分离发布，首页只作为入口。</span>
    </footer>
  </main>
</body>
</html>
